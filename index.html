<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tempo Real Stablecoin DEX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: radial-gradient(circle at top left, #0b1120, #020617);
      --card-bg: rgba(15, 23, 42, 0.95);
      --card-border: rgba(148, 163, 184, 0.25);
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.18);
      --text-main: #e5e7eb;
      --text-soft: #9ca3af;
      --success: #22c55e;
      --danger: #f87171;
      --radius-lg: 18px;
      --font-main: system-ui, -apple-system, sans-serif;
    }
    
    * { box-sizing: border-box; }
    
    body { 
      font-family: var(--font-main); 
      background: var(--bg); 
      color: var(--text-main); 
      margin: 0; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
      min-height: 100vh;
    }
    
    .app { 
      width: 100%; 
      max-width: 500px; 
      background: var(--card-bg); 
      border: 1px solid var(--card-border); 
      padding: 20px; 
      border-radius: var(--radius-lg); 
      box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    }
    
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 20px; 
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .logo { 
      font-size: 20px; 
      font-weight: bold; 
      color: var(--accent); 
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .wallet-section {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .wallet-btn { 
      background: var(--accent); 
      color: #000; 
      border: none; 
      padding: 10px 18px; 
      border-radius: 20px; 
      cursor: pointer; 
      font-weight: bold;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .wallet-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    
    .wallet-btn.connected {
      background: var(--success);
    }
    
    .disconnect-btn {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 10px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .disconnect-btn:hover {
      background: rgba(248, 113, 113, 0.1);
    }
    
    .network-badge {
      font-size: 11px;
      color: var(--text-soft);
      padding: 4px 10px;
      border: 1px solid var(--card-border);
      border-radius: 20px;
    }
    
    .swap-box { 
      background: rgba(0,0,0,0.2); 
      border: 1px solid var(--card-border); 
      padding: 15px; 
      border-radius: 12px; 
      margin-bottom: 10px; 
    }
    
    .swap-box label { 
      font-size: 12px; 
      color: var(--text-soft); 
      display: block;
      margin-bottom: 8px;
    }
    
    .swap-input-row {
      display: flex; 
      align-items: center;
      gap: 10px;
    }
    
    .swap-box input { 
      background: transparent; 
      border: none; 
      color: white; 
      font-size: 24px; 
      flex: 1;
      outline: none;
      font-family: inherit;
    }
    
    .token-select { 
      background: #1e293b; 
      color: white; 
      border: 1px solid var(--card-border); 
      border-radius: 8px; 
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    
    .swap-arrow {
      text-align: center; 
      margin: -5px 0; 
      color: var(--accent);
      font-size: 20px;
    }
    
    .swap-btn { 
      width: 100%; 
      background: var(--success); 
      color: white; 
      border: none; 
      padding: 16px; 
      border-radius: 12px; 
      font-size: 18px; 
      font-weight: bold; 
      cursor: pointer; 
      margin-top: 10px;
      transition: all 0.2s;
    }
    
    .swap-btn:hover:not(:disabled) {
      filter: brightness(1.1);
    }
    
    .swap-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    #status { 
      margin-top: 12px; 
      font-size: 13px; 
      text-align: center; 
      color: var(--text-soft);
      min-height: 20px;
      padding: 8px;
      border-radius: 8px;
      line-height: 1.5;
    }
    
    #status.success {
      color: var(--success);
      background: rgba(34, 197, 94, 0.1);
    }
    
    #status.error {
      color: var(--danger);
      background: rgba(248, 113, 113, 0.1);
    }
    
    #status.pending {
      color: var(--accent);
      background: var(--accent-soft);
    }
    
    .balance-list { 
      margin-top: 20px; 
      font-size: 14px; 
      border-top: 1px solid var(--card-border); 
      padding-top: 15px; 
    }
    
    .balance-title {
      font-size: 12px;
      color: var(--text-soft);
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    
    .balance-item { 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 8px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
    }
    
    .balance-item span:first-child {
      color: var(--accent);
    }
    .tx-link { color: var(--accent); text-decoration: none; }
    .tx-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="app">
    <div class="header">
      <div class="logo">💱 Tempo DEX</div>
      <div class="wallet-section">
        <span class="network-badge" id="networkBadge">Not Connected</span>
        <button class="wallet-btn" id="connectBtn">Connect Wallet</button>
        <button class="disconnect-btn" id="disconnectBtn" style="display: none;">Disconnect</button>
      </div>
    </div>

    <div class="swap-box">
      <label>You Pay</label>
      <div class="swap-input-row">
        <input type="number" id="fromAmount" placeholder="0.0" min="0" step="0.01">
        <select id="fromToken" class="token-select">
          <option value="pathUSD">pathUSD</option>
          <option value="AlphaUSD">AlphaUSD</option>
          <option value="BetaUSD">BetaUSD</option>
        </select>
      </div>
    </div>

    <div class="swap-arrow">↓</div>

    <div class="swap-box">
      <label>You Receive (Estimated)</label>
      <div class="swap-input-row">
        <input type="number" id="toAmount" placeholder="0.0" readonly>
        <select id="toToken" class="token-select">
          <option value="pathUSD">pathUSD</option>
          <option value="AlphaUSD" selected>AlphaUSD</option>
          <option value="BetaUSD">BetaUSD</option>
        </select>
      </div>
    </div>

    <button class="swap-btn" id="swapBtn" disabled>Connect Wallet to Swap</button>
    <div id="status">Please connect your MetaMask wallet</div>

    <div class="balance-list" id="balanceList" style="display: none;">
      <div class="balance-title">Your Balances</div>
      <div id="balanceContent"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

  <script>
    // --- Configuration from Tempo Documentation ---
    const TEMPO_CHAIN_ID = 42431;
    const TEMPO_CHAIN_HEX = '0xA5BF';
    const EXPLORER_URL = 'https://explore.tempo.xyz';

    // The Exchange System Contract Address
    const EXCHANGE_CONTRACT_ADDRESS = '0x000000000000000000000000000000000000000A';

    const TOKENS = {
      "pathUSD": { address: "0x20c0000000000000000000000000000000000000", decimals: 6 },
      "AlphaUSD": { address: "0x20c0000000000000000000000000000000000001", decimals: 6 },
      "BetaUSD": { address: "0x20c0000000000000000000000000000000000002", decimals: 6 }
    };
    
    // ABIs (Application Binary Interfaces)
    const TIP20_ABI = [
      "function balanceOf(address owner) view returns (uint256)",
      "function approve(address spender, uint256 amount) returns (bool)"
    ];
    
    const EXCHANGE_ABI = [
      "function swap(address token_in, address token_out, uint256 amount_in, uint256 min_amount_out) returns (uint256 amount_out)"
    ];

    let provider, signer, userAddress;
    let isConnected = false;

    // --- DOM Elements ---
    const connectBtn = document.getElementById("connectBtn");
    const disconnectBtn = document.getElementById("disconnectBtn");
    const networkBadge = document.getElementById("networkBadge");
    const swapBtn = document.getElementById("swapBtn");
    const statusEl = document.getElementById("status");
    const balanceList = document.getElementById("balanceList");
    const balanceContent = document.getElementById("balanceContent");
    const fromAmountEl = document.getElementById("fromAmount");
    const toAmountEl = document.getElementById("toAmount");
    const fromTokenEl = document.getElementById("fromToken");
    const toTokenEl = document.getElementById("toToken");

    function setStatus(msg, type = '') {
      statusEl.innerHTML = msg; // Use innerHTML to render links
      statusEl.className = type;
    }

    // --- Wallet Connection & UI Logic (Unchanged) ---
    async function switchToTempoNetwork() {
      try {
        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: TEMPO_CHAIN_HEX }] });
      } catch (switchError) {
        if (switchError.code === 4902) {
          await window.ethereum.request({
            method: 'wallet_addEthereumChain',
            params: [{ chainId: TEMPO_CHAIN_HEX, chainName: 'Tempo Moderato Testnet', rpcUrls: ['https://rpc.moderato.tempo.xyz'] }]
          });
        } else { throw switchError; }
      }
    }

    async function connectWallet() {
      if (!window.ethereum) return setStatus("Please install MetaMask", "error");
      try {
        setStatus("Connecting...", "pending");
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        await switchToTempoNetwork();
        
        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        userAddress = accounts[0];
        isConnected = true;

        connectBtn.textContent = userAddress.slice(0, 6) + "..." + userAddress.slice(-4);
        connectBtn.classList.add("connected");
        disconnectBtn.style.display = "inline-block";
        networkBadge.textContent = "Tempo 42431";
        networkBadge.style.color = "var(--success)";
        swapBtn.disabled = false;
        swapBtn.textContent = "Swap";
        
        setStatus("Connected! Fetching balances...", "success");
        await fetchBalancesFromChain();
      } catch (err) {
        setStatus("Connection failed: " + err.message, "error");
      }
    }

    function disconnectWallet() {
      signer = undefined; userAddress = undefined; isConnected = false;
      connectBtn.textContent = "Connect Wallet";
      connectBtn.classList.remove("connected");
      disconnectBtn.style.display = "none";
      networkBadge.textContent = "Not Connected";
      networkBadge.style.color = "";
      swapBtn.disabled = true;
      swapBtn.textContent = "Connect Wallet to Swap";
      balanceList.style.display = "none";
      fromAmountEl.value = "";
      toAmountEl.value = "";
      setStatus("Wallet disconnected");
    }

    async function fetchBalancesFromChain() {
      if (!isConnected) return;
      balanceContent.innerHTML = "";
      for (const [symbol, info] of Object.entries(TOKENS)) {
        try {
          const contract = new ethers.Contract(info.address, (new ethers.Interface(TIP20_ABI)), provider);
          const rawBal = await contract.balanceOf(userAddress);
          const formatted = parseFloat(ethers.formatUnits(rawBal, info.decimals));
          balanceContent.innerHTML += `<div class="balance-item"><span>${symbol}</span><span>${formatted.toFixed(4)}</span></div>`;
        } catch (e) { console.error("Failed to load balance for", symbol); }
      }
      balanceList.style.display = "block";
    }

    // --- REAL SWAP LOGIC ---
    async function performRealSwap() {
      if (!isConnected || !signer) return setStatus("Please connect wallet first", "error");

      const amountToPay = parseFloat(fromAmountEl.value);
      const fromSymbol = fromTokenEl.value;
      const toSymbol = toTokenEl.value;

      if (!amountToPay || amountToPay <= 0) return setStatus("Please enter a valid amount", "error");
      if (fromSymbol === toSymbol) return setStatus("Cannot swap the same token", "error");

      swapBtn.disabled = true;
      
      try {
        const fromTokenInfo = TOKENS[fromSymbol];
        const toTokenInfo = TOKENS[toSymbol];
        const amountIn = ethers.parseUnits(amountToPay.toString(), fromTokenInfo.decimals);
        
        // --- Step 1: Approve ---
        setStatus("1/2: Approving token spend...", "pending");
        const tokenContract = new ethers.Contract(fromTokenInfo.address, (new ethers.Interface(TIP20_ABI)), signer);
        const approveTx = await tokenContract.approve(EXCHANGE_CONTRACT_ADDRESS, amountIn);
        await approveTx.wait();
        setStatus("Approval confirmed! Proceeding to swap...", "pending");
        
        // --- Step 2: Swap ---
        setStatus("2/2: Executing swap...", "pending");
        const exchangeContract = new ethers.Contract(EXCHANGE_CONTRACT_ADDRESS, (new ethers.Interface(EXCHANGE_ABI)), signer);
        
        // For slippage protection, we'll accept up to 1% less than expected
        const minAmountOut = ethers.parseUnits((amountToPay * 0.99).toString(), toTokenInfo.decimals);
        
        const swapTx = await exchangeContract.swap(fromTokenInfo.address, toTokenInfo.address, amountIn, minAmountOut);
        
        setStatus(`Swap sent: ${swapTx.hash.slice(0,10)}...`, "pending");
        await swapTx.wait();

        const explorerLink = `<a href="${EXPLORER_URL}/tx/${swapTx.hash}" target="_blank" class="tx-link">View on Explorer ↗</a>`;
        setStatus(`Swap successful! ${explorerLink}`, "success");

        // --- Step 3: Update UI ---
        await fetchBalancesFromChain();
        fromAmountEl.value = "";
        toAmountEl.value = "";

      } catch (err) {
        console.error(err);
        if (err.code === 4001) {
          setStatus("Transaction rejected by user", "error");
        } else {
          setStatus("Transaction failed. Check console for details.", "error");
        }
      } finally {
        swapBtn.disabled = false;
      }
    }

    // --- Event Listeners ---
    connectBtn.addEventListener("click", connectWallet);
    disconnectBtn.addEventListener("click", disconnectWallet);
    swapBtn.addEventListener("click", performRealSwap);

    fromAmountEl.addEventListener("input", (e) => {
      const val = parseFloat(e.target.value);
      toAmountEl.value = val > 0 ? (val * 0.999).toFixed(6) : ""; // Estimate with a small fee
    });
  </script>
</body>
</html>
