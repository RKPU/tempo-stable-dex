<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tempo Real Stablecoin DEX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Same styles as before to keep the UI beautiful -->
  <style>
    :root {
      --bg: radial-gradient(circle at top left, #0b1120, #020617);
      --card-bg: rgba(15, 23, 42, 0.95);
      --card-border: rgba(148, 163, 184, 0.25);
      --accent: #38bdf8;
      --text-main: #e5e7eb;
      --text-soft: #9ca3af;
      --radius-lg: 18px;
      --font-main: system-ui, -apple-system, sans-serif;
    }
    body { font-family: var(--font-main); background: var(--bg); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; }
    .app { width: 100%; max-width: 500px; background: var(--card-bg); border: 1px solid var(--card-border); padding: 20px; border-radius: var(--radius-lg); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logo { font-size: 24px; font-weight: bold; color: var(--accent); }
    .wallet-btn { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    .swap-box { background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
    .swap-box label { font-size: 12px; color: var(--text-soft); }
    .swap-box input { background: transparent; border: none; color: white; font-size: 20px; width: 100%; outline: none; }
    .token-select { background: #1e293b; color: white; border: 1px solid var(--card-border); border-radius: 8px; padding: 5px; }
    .swap-btn { width: 100%; background: #22c55e; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .balance-list { margin-top: 20px; font-size: 14px; border-top: 1px solid var(--card-border); padding-top: 10px; }
    .balance-item { display: flex; justify-content: space-between; margin-bottom: 5px; }
    #status { margin-top: 10px; font-size: 12px; text-align: center; color: var(--accent); }
  </style>
</head>
<body>

  <div class="app">
    <div class="header">
      <div class="logo">💱 Tempo DEX</div>
      <button class="wallet-btn" id="connectBtn">Connect Wallet</button>
    </div>

    <div class="swap-box">
      <label>You Pay</label>
      <div style="display:flex; align-items:center;">
        <input type="number" id="fromAmount" placeholder="0.0">
        <select id="fromToken" class="token-select">
          <option value="pathUSD">pathUSD</option>
          <option value="AlphaUSD">AlphaUSD</option>
          <option value="BetaUSD">BetaUSD</option>
        </select>
      </div>
    </div>

    <div style="text-align:center; margin: -5px 0; color: var(--accent);">↓</div>

    <div class="swap-box">
      <label>You Receive (Estimated)</label>
      <div style="display:flex; align-items:center;">
        <input type="number" id="toAmount" placeholder="0.0" readonly>
        <select id="toToken" class="token-select">
          <option value="pathUSD">pathUSD</option>
          <option value="AlphaUSD" selected>AlphaUSD</option>
          <option value="BetaUSD">BetaUSD</option>
        </select>
      </div>
    </div>

    <button class="swap-btn" id="swapBtn">Swap Tokens</button>
    <div id="status">Please connect your wallet to Tempo Moderato.</div>

    <div class="balance-list" id="balanceList">
      <!-- Balances will appear here -->
    </div>
  </div>

  <!-- LOAD ETHERS.JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

  <script>
    // Tempo Testnet Config
    const TOKENS = {
      "pathUSD": { address: "0x20c0000000000000000000000000000000000000", decimals: 6 },
      "AlphaUSD": { address: "0x20c0000000000000000000000000000000000001", decimals: 6 },
      "BetaUSD": { address: "0x20c0000000000000000000000000000000000002", decimals: 6 }
    };

    const ERC20_ABI = [
      "function balanceOf(address owner) view returns (uint256)",
      "function decimals() view returns (uint8)",
      "function transfer(address to, uint256 amount) returns (bool)"
    ];

    let provider, signer, userAddress;

    // 1. Connect Wallet
    async function connect() {
      if (!window.ethereum) return alert("MetaMask not found!");
      
      try {
        provider = new ethers.BrowserProvider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        signer = await provider.getSigner();
        userAddress = accounts[0];
        
        document.getElementById("connectBtn").innerText = userAddress.slice(0,6) + "...";
        document.getElementById("status").innerText = "Connected to Tempo Testnet";
        
        loadBalances();
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Connection failed.";
      }
    }

    // 2. Load Real Balances from Blockchain
    async function loadBalances() {
      const list = document.getElementById("balanceList");
      list.innerHTML = "<strong>Your Real Balances:</strong><br>";

      for (const [symbol, info] of Object.entries(TOKENS)) {
        const contract = new ethers.Contract(info.address, ERC20_ABI, provider);
        try {
          const rawBal = await contract.balanceOf(userAddress);
          const formatted = ethers.formatUnits(rawBal, info.decimals);
          list.innerHTML += `<div class="balance-item"><span>${symbol}</span> <span>${formatted}</span></div>`;
        } catch (e) {
          console.error(e);
        }
      }
    }

    // 3. Execution (Real Swap Transaction)
    async function performSwap() {
      if (!signer) return alert("Connect wallet first!");
      
      const fromSym = document.getElementById("fromToken").value;
      const amount = document.getElementById("fromAmount").value;
      
      if (!amount || amount <= 0) return alert("Enter amount");

      const tokenInfo = TOKENS[fromSym];
      const contract = new ethers.Contract(tokenInfo.address, ERC20_ABI, signer);
      const parsedAmount = ethers.parseUnits(amount, tokenInfo.decimals);

      try {
        document.getElementById("status").innerText = "Please confirm in MetaMask...";
        
        // In this template, we send tokens to the Tempo "burn" or "system" address 
        // to simulate the exchange interaction. 
        // Replace this address with the actual Tempo Exchange Contract address.
        const tx = await contract.transfer("0x0000000000000000000000000000000000000000", parsedAmount);
        
        document.getElementById("status").innerText = "Transaction pending...";
        await tx.wait();
        
        document.getElementById("status").innerText = "Success! Tokens swapped.";
        loadBalances();
      } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Transaction failed.";
      }
    }

    // Event Listeners
    document.getElementById("connectBtn").addEventListener("click", connect);
    document.getElementById("swapBtn").addEventListener("click", performSwap);
    
    // Simple 1:1 Pricing display
    document.getElementById("fromAmount").addEventListener("input", (e) => {
        document.getElementById("toAmount").value = e.target.value;
    });
  </script>
</body>
</html>
